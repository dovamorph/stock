# .github/workflows/daily_screener.yml

name: 📊 StockPilot 자동 스크리닝

on:
  schedule:
    - cron: '0 0-10 * * 1-5'   # 평일 09:00~16:30 KST, 1시간마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: pip install -r requirements.txt

      - name: 🔍 스크리닝 실행
        run: python screener.py
        env:
          KIS_APP_KEY:     ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:  ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT:     ${{ secrets.KIS_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: 💾 results.json 커밋
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add results.json
          git diff --staged --quiet || git commit -m "📊 스크리닝 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
